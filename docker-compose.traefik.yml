# Production self-hosting compose file for a VPS behind Traefik.
#
# The deploy workflow copies this file to the VPS as docker-compose.yml and
# runs it with a private .env that is never committed to Git.

services:
  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER_LOWERCASE:?set IMAGE_OWNER_LOWERCASE}/expense-manager-app:${IMAGE_TAG:-latest}
    container_name: expense-manager-app
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${APP_MEM_LIMIT:-512m}
    cpus: ${APP_CPUS:-1.0}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-Expense Manager}
      ORIGIN: ${ORIGIN:?set ORIGIN}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      DATABASE_URL: postgres://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      UPLOAD_DIR: /app/uploads
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-auto}
      EMAIL_DELIVERY: ${EMAIL_DELIVERY:-}
      MAILJET_API_KEY: ${MAILJET_API_KEY:-}
      MAILJET_SECRET_KEY: ${MAILJET_SECRET_KEY:-}
      MAILJET_FROM: ${MAILJET_FROM:-}
      SENDER_API_TOKEN: ${SENDER_API_TOKEN:-}
      SENDER_FROM: ${SENDER_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - private
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=${TRAEFIK_NETWORK:-web}'
      - 'traefik.http.routers.expense-manager.rule=Host(`${DOMAIN_NAME:?set DOMAIN_NAME}`)'
      - 'traefik.http.routers.expense-manager.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}'
      - 'traefik.http.routers.expense-manager.tls=true'
      - 'traefik.http.routers.expense-manager.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}'
      - 'traefik.http.routers.expense-manager.service=expense-manager'
      - 'traefik.http.routers.expense-manager.middlewares=expense-manager-security'
      - 'traefik.http.routers.expense-manager-http.rule=Host(`${DOMAIN_NAME:?set DOMAIN_NAME}`)'
      - 'traefik.http.routers.expense-manager-http.entrypoints=${TRAEFIK_HTTP_ENTRYPOINT:-web}'
      - 'traefik.http.routers.expense-manager-http.middlewares=expense-manager-https-redirect'
      - 'traefik.http.routers.expense-manager-http.service=expense-manager'
      - 'traefik.http.middlewares.expense-manager-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.middlewares.expense-manager-security.headers.stsSeconds=31536000'
      - 'traefik.http.middlewares.expense-manager-security.headers.stsIncludeSubdomains=true'
      - 'traefik.http.middlewares.expense-manager-security.headers.contentTypeNosniff=true'
      - 'traefik.http.middlewares.expense-manager-security.headers.frameDeny=true'
      - 'traefik.http.middlewares.expense-manager-security.headers.referrerPolicy=strict-origin-when-cross-origin'
      - 'traefik.http.middlewares.expense-manager-security.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()'
      - 'traefik.http.services.expense-manager.loadbalancer.server.port=3000'

  migrate:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER_LOWERCASE:?set IMAGE_OWNER_LOWERCASE}/expense-manager-migrate:${IMAGE_TAG:-latest}
    container_name: expense-manager-migrate
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles: ['tools']
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      - private

  postgres:
    image: postgres:18-alpine
    container_name: expense-manager-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    cpus: ${POSTGRES_CPUS:-1.0}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  backup:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER_LOWERCASE:?set IMAGE_OWNER_LOWERCASE}/expense-manager-backup:${IMAGE_TAG:-latest}
    container_name: expense-manager-backup
    profiles: ['backup']
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${BACKUP_MEM_LIMIT:-256m}
    cpus: ${BACKUP_CPUS:-0.5}
    environment:
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
      RESTIC_HOST: ${RESTIC_HOST:-expense-manager}
      RESTIC_INIT_REPOSITORY: ${RESTIC_INIT_REPOSITORY:-true}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-7}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-4}
      RESTIC_KEEP_MONTHLY: ${RESTIC_KEEP_MONTHLY:-12}
      RESTIC_CHECK_AFTER_BACKUP: ${RESTIC_CHECK_AFTER_BACKUP:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    volumes:
      - uploads:/app/uploads:ro
    tmpfs:
      - /tmp:size=512m,mode=1777
    entrypoint: ['/bin/sh', '-c']
    command:
      [
        'if [ "$${BACKUP_ENABLED:-true}" != "true" ]; then echo "Remote backup disabled."; sleep infinity; fi; while true; do /usr/local/bin/backup.sh; sleep 86400; done'
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private

volumes:
  postgres_data:
  uploads:

networks:
  private:
    driver: bridge
  traefik:
    name: ${TRAEFIK_NETWORK:-web}
    external: true
