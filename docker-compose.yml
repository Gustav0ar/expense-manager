services:
  app:
    build:
      context: .
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${APP_MEM_LIMIT:-512m}
    cpus: ${APP_CPUS:-1.0}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-Expense Manager}
      ORIGIN: ${ORIGIN:?set ORIGIN}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
      DATABASE_URL: postgres://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health >/dev/null 2>&1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - private

  migrate:
    build:
      context: .
      target: migrator
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    profiles: ['tools']
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private

  caddy:
    image: caddy:2-alpine
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    cpus: ${CADDY_CPUS:-0.5}
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      app:
        condition: service_healthy
    networks:
      - private

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    cpus: ${POSTGRES_CPUS:-1.0}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  backup:
    build:
      context: .
      target: backup
    profiles: ['backup']
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${BACKUP_MEM_LIMIT:-256m}
    cpus: ${BACKUP_CPUS:-0.5}
    environment:
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
      RESTIC_HOST: ${RESTIC_HOST:-expense-manager}
      RESTIC_INIT_REPOSITORY: ${RESTIC_INIT_REPOSITORY:-true}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-7}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-4}
      RESTIC_KEEP_MONTHLY: ${RESTIC_KEEP_MONTHLY:-12}
      RESTIC_CHECK_AFTER_BACKUP: ${RESTIC_CHECK_AFTER_BACKUP:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    volumes:
      - uploads:/app/uploads:ro
    tmpfs:
      - /tmp:size=512m,mode=1777
    entrypoint: ['/bin/sh', '-c']
    command:
      [
        'if [ "$${BACKUP_ENABLED:-true}" != "true" ]; then echo "Remote backup disabled."; sleep infinity; fi; while true; do /usr/local/bin/backup.sh; sleep 86400; done'
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  uploads:

networks:
  private:
    driver: bridge
