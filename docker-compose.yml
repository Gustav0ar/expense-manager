services:
  app:
    build:
      context: .
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${APP_MEM_LIMIT:-512m}
    cpus: ${APP_CPUS:-1.0}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-Expense Manager}
      ORIGIN: ${ORIGIN:?set ORIGIN}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      BETTER_AUTH_SECRET_FILE: /run/secrets/better_auth_secret
      BETTER_AUTH_SECRET_PREVIOUS_FILE: /run/secrets/better_auth_secret_previous
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET_COMPAT:-}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      DATABASE_URL: ${DATABASE_URL:-}
      DB_POOL_MAX: ${DB_POOL_MAX:-5}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-3M}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      TRUSTED_PROXY_CIDR: ${TRUSTED_PROXY_CIDR:-}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-auto}
      EMAIL_DELIVERY: ${EMAIL_DELIVERY:-}
      MAILJET_API_KEY: ${MAILJET_API_KEY:-}
      MAILJET_SECRET_KEY: ${MAILJET_SECRET_KEY:-}
      MAILJET_FROM: ${MAILJET_FROM:-}
      MAILJET_WEBHOOK_USERNAME: ${MAILJET_WEBHOOK_USERNAME:-}
      MAILJET_WEBHOOK_PASSWORD: ${MAILJET_WEBHOOK_PASSWORD:-}
      SENDER_API_TOKEN: ${SENDER_API_TOKEN:-}
      SENDER_FROM: ${SENDER_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      OTEL_TRACING_ENABLED: ${OTEL_TRACING_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-expense-manager}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-production}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_TRACES_SAMPLE_RATE: ${OTEL_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - better_auth_secret
      - better_auth_secret_previous
      - postgres_password
    volumes:
      - uploads:/app/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - private

  migrate:
    build:
      context: .
      target: migrator
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    profiles: ['tools']
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_password
    networks:
      - private

  caddy:
    image: caddy:2-alpine
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    cpus: ${CADDY_CPUS:-0.5}
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      app:
        condition: service_healthy
    networks:
      - private

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    cpus: ${POSTGRES_CPUS:-1.0}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    secrets:
      - postgres_password
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  backup:
    build:
      context: .
      target: backup
    profiles: ['backup']
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${BACKUP_MEM_LIMIT:-256m}
    cpus: ${BACKUP_CPUS:-0.5}
    environment:
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      RESTIC_HOST: ${RESTIC_HOST:-expense-manager}
      RESTIC_INIT_REPOSITORY: ${RESTIC_INIT_REPOSITORY:-true}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-7}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-4}
      RESTIC_KEEP_MONTHLY: ${RESTIC_KEEP_MONTHLY:-12}
      RESTIC_CHECK_AFTER_BACKUP: ${RESTIC_CHECK_AFTER_BACKUP:-false}
      ATTACHMENT_BACKUP_MAX_CAPTURE_SECONDS: ${ATTACHMENT_BACKUP_MAX_CAPTURE_SECONDS:-86400}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    volumes:
      - uploads:/app/uploads:ro
    secrets:
      - postgres_password
      - restic_password
    tmpfs:
      - /tmp:size=512m,mode=1777
    entrypoint: ['/bin/sh', '-c']
    command:
      [
        'if [ "$${BACKUP_ENABLED:-true}" != "true" ]; then echo "Remote backup disabled."; sleep infinity; fi; while true; do /usr/local/bin/backup.sh; sleep 86400; done'
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  uploads:

networks:
  private:
    driver: bridge

secrets:
  better_auth_secret:
    file: ${BETTER_AUTH_SECRET_SOURCE_FILE:-./secrets/better_auth_secret}
  better_auth_secret_previous:
    file: ${BETTER_AUTH_SECRET_PREVIOUS_SOURCE_FILE:-/dev/null}
  postgres_password:
    file: ${POSTGRES_PASSWORD_SOURCE_FILE:-./secrets/postgres_password}
  restic_password:
    file: ${RESTIC_PASSWORD_SOURCE_FILE:-./secrets/restic_password}
