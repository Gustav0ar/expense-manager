name: Deploy

# This workflow is safe for a public repository when configured as documented:
# real hostnames, IPs, SSH usernames, keys, domains and app environment values
# stay in GitHub environment secrets/variables and are copied to the VPS during
# deploy without being committed to the repository.

on:
  workflow_run:
    workflows: ['Containers']
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force deploy even if the last container build failed'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: read
  actions: read

concurrency:
  group: expense-manager-production
  cancel-in-progress: true

jobs:
  preflight:
    name: Verify required workflows
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Skip checks for forced manual deploy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' }}
        run: echo "Forced manual deploy requested; skipping workflow preflight."

      - name: Require CI, Security and Containers for this SHA
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.force != 'true' }}
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = process.env.HEAD_SHA;
            const requiredWorkflows = ['CI', 'Security', 'Containers'];
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            if (!headSha) {
              core.setFailed('Unable to determine deploy commit SHA.');
              return;
            }

            for (let attempt = 1; attempt <= 60; attempt += 1) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: headSha,
                per_page: 100
              });

              const waiting = [];
              const failed = [];

              for (const workflowName of requiredWorkflows) {
                const runs = data.workflow_runs
                  .filter((run) => run.name === workflowName && run.head_sha === headSha)
                  .sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at));
                const latest = runs[0];

                if (!latest) {
                  waiting.push(`${workflowName}: missing`);
                  continue;
                }
                if (latest.status !== 'completed') {
                  waiting.push(`${workflowName}: ${latest.status}`);
                  continue;
                }
                if (latest.conclusion !== 'success') {
                  failed.push(`${workflowName}: ${latest.conclusion} (${latest.html_url})`);
                }
              }

              if (failed.length > 0) {
                core.setFailed(`Required workflow failed for ${headSha}: ${failed.join(', ')}`);
                return;
              }
              if (waiting.length === 0) {
                core.info(`All required workflows passed for ${headSha}.`);
                return;
              }
              if (attempt === 60) {
                core.setFailed(`Timed out waiting for required workflows on ${headSha}: ${waiting.join(', ')}`);
                return;
              }

              core.info(`Waiting for required workflows on ${headSha}: ${waiting.join(', ')}`);
              await sleep(10_000);
            }

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: preflight
    environment: production
    if: needs.preflight.result == 'success'
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Build deploy summary
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          IMAGE_OWNER: ${{ vars.IMAGE_OWNER_LOWERCASE }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          HEAD_SHA_SHORT="$(printf '%s' "${HEAD_SHA}" | cut -c1-7)"
          IMAGE_TAG="sha-${HEAD_SHA_SHORT}"
          HOST_FP="$(printf '%s' "${VPS_HOST}" | sha256sum | cut -c1-12)"
          cat > .github/deploy-summary.json <<EOF
          {
            "service": "expense-manager",
            "image_tag": "${IMAGE_TAG}",
            "head_sha": "${HEAD_SHA}",
            "image_owner": "${IMAGE_OWNER}",
            "trigger": "${{ github.event_name }}",
            "host_identifier_hash": "${HOST_FP}"
          }
          EOF

      - name: Upload public deploy summary
        uses: actions/upload-artifact@v7
        with:
          name: deploy-summary
          path: .github/deploy-summary.json
          if-no-files-found: error
          retention-days: 90

      - name: Connect to Tailscale
        if: env.TAILSCALE_AUTHKEY != ''
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          ping: ${{ secrets.VPS_HOST }}

      - name: Prepare and test SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_HOST_FINGERPRINT: ${{ secrets.VPS_SSH_HOST_FINGERPRINT }}
          SSH_KEY_FILE: ${{ runner.temp }}/vps_ssh_key
          KNOWN_HOSTS_FILE: ${{ runner.temp }}/known_hosts
        run: |
          set -euo pipefail

          for name in VPS_HOST VPS_USERNAME VPS_PORT VPS_SSH_KEY VPS_SSH_HOST_FINGERPRINT; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not set in the production environment."
              exit 1
            fi
          done

          install -m 700 -d "$(dirname "${SSH_KEY_FILE}")" "${HOME}/.ssh"
          printf '%s\n' "${VPS_SSH_KEY}" | sed 's/\r$//' > "${SSH_KEY_FILE}"
          chmod 600 "${SSH_KEY_FILE}"

          if ! ssh-keygen -y -f "${SSH_KEY_FILE}" >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY is not a parseable private SSH key."
            exit 1
          fi

          KEY_FP="$(ssh-keygen -lf "${SSH_KEY_FILE}" | awk '{print $2}')"
          echo "Deploy key fingerprint: ${KEY_FP}"

          scan_file="$(mktemp)"
          candidate_file="$(mktemp)"
          trap 'rm -f "${scan_file}" "${candidate_file}"' EXIT
          ssh-keyscan -T 15 -p "${VPS_PORT}" "${VPS_HOST}" > "${scan_file}" 2>/dev/null
          : > "${KNOWN_HOSTS_FILE}"
          while IFS= read -r host_key; do
            printf '%s\n' "${host_key}" > "${candidate_file}"
            candidate_fingerprint="$(ssh-keygen -lf "${candidate_file}" -E sha256 | awk '{print $2}')"
            if [ "${candidate_fingerprint}" = "${VPS_SSH_HOST_FINGERPRINT}" ]; then
              printf '%s\n' "${host_key}" >> "${KNOWN_HOSTS_FILE}"
            fi
          done < "${scan_file}"
          if [ ! -s "${KNOWN_HOSTS_FILE}" ]; then
            echo "::error::No scanned VPS host key matched VPS_SSH_HOST_FINGERPRINT."
            exit 1
          fi
          chmod 600 "${KNOWN_HOSTS_FILE}"

          ssh -i "${SSH_KEY_FILE}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${KNOWN_HOSTS_FILE}" \
            -o ConnectTimeout=15 \
            -p "${VPS_PORT}" \
            "${VPS_USERNAME}@${VPS_HOST}" \
            true

      - name: Install production environment file
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_ENV_FILE: ${{ secrets.VPS_ENV_FILE }}
          PUBLIC_APP_NAME: ${{ vars.PUBLIC_APP_NAME || 'Expense Manager' }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          ORIGIN: ${{ secrets.ORIGIN }}
          TRUSTED_ORIGINS: ${{ secrets.TRUSTED_ORIGINS }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_SECRET_PREVIOUS: ${{ secrets.BETTER_AUTH_SECRET_PREVIOUS }}
          REQUIRE_EMAIL_VERIFICATION: ${{ vars.REQUIRE_EMAIL_VERIFICATION || 'true' }}
          ALLOW_REGISTRATION: ${{ vars.ALLOW_REGISTRATION || 'false' }}
          AUTH_RATE_LIMIT_IDENTIFIER_MAX: ${{ vars.AUTH_RATE_LIMIT_IDENTIFIER_MAX || '' }}
          AUTH_RATE_LIMIT_IP_MAX: ${{ vars.AUTH_RATE_LIMIT_IP_MAX || '' }}
          AUTH_RATE_LIMIT_WINDOW_SECONDS: ${{ vars.AUTH_RATE_LIMIT_WINDOW_SECONDS || '' }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'expense_manager' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'expense_manager' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_POOL_MAX: ${{ vars.DB_POOL_MAX || '5' }}
          TRUST_PROXY_HEADERS: ${{ vars.TRUST_PROXY_HEADERS || 'true' }}
          TRUSTED_PROXY_CIDR: ${{ vars.TRUSTED_PROXY_CIDR || '' }}
          BACKUP_ENABLED: ${{ vars.BACKUP_ENABLED || 'true' }}
          RESTIC_REPOSITORY: ${{ secrets.RESTIC_REPOSITORY }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          RESTIC_HOST: ${{ vars.RESTIC_HOST || 'expense-manager' }}
          RESTIC_INIT_REPOSITORY: ${{ vars.RESTIC_INIT_REPOSITORY || 'true' }}
          RESTIC_KEEP_DAILY: ${{ vars.RESTIC_KEEP_DAILY || '7' }}
          RESTIC_KEEP_WEEKLY: ${{ vars.RESTIC_KEEP_WEEKLY || '4' }}
          RESTIC_KEEP_MONTHLY: ${{ vars.RESTIC_KEEP_MONTHLY || '12' }}
          RESTIC_CHECK_AFTER_BACKUP: ${{ vars.RESTIC_CHECK_AFTER_BACKUP || 'false' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
          IMAGE_OWNER_LOWERCASE: ${{ vars.IMAGE_OWNER_LOWERCASE }}
          IMAGE_CLEANUP_ENABLED: ${{ vars.IMAGE_CLEANUP_ENABLED || 'true' }}
          TRAEFIK_NETWORK: ${{ vars.TRAEFIK_NETWORK || 'web' }}
          TRAEFIK_HTTP_ENTRYPOINT: ${{ vars.TRAEFIK_HTTP_ENTRYPOINT || 'web' }}
          TRAEFIK_ENTRYPOINT: ${{ vars.TRAEFIK_ENTRYPOINT || 'websecure' }}
          TRAEFIK_CERT_RESOLVER: ${{ vars.TRAEFIK_CERT_RESOLVER || 'le' }}
          APP_MEM_LIMIT: ${{ vars.APP_MEM_LIMIT || '512m' }}
          APP_CPUS: ${{ vars.APP_CPUS || '1.0' }}
          POSTGRES_MEM_LIMIT: ${{ vars.POSTGRES_MEM_LIMIT || '1g' }}
          POSTGRES_CPUS: ${{ vars.POSTGRES_CPUS || '1.0' }}
          BACKUP_MEM_LIMIT: ${{ vars.BACKUP_MEM_LIMIT || '256m' }}
          BACKUP_CPUS: ${{ vars.BACKUP_CPUS || '0.5' }}
          EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER || 'auto' }}
          EMAIL_DELIVERY_TIMEOUT_MS: ${{ vars.EMAIL_DELIVERY_TIMEOUT_MS || '15000' }}
          EMAIL_DELIVERY_CONCURRENCY: ${{ vars.EMAIL_DELIVERY_CONCURRENCY || '5' }}
          MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
          MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
          MAILJET_FROM: ${{ secrets.MAILJET_FROM }}
          MAILJET_WEBHOOK_USERNAME: ${{ secrets.MAILJET_WEBHOOK_USERNAME }}
          MAILJET_WEBHOOK_PASSWORD: ${{ secrets.MAILJET_WEBHOOK_PASSWORD }}
          SENDER_API_TOKEN: ${{ secrets.SENDER_API_TOKEN }}
          SENDER_FROM: ${{ secrets.SENDER_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_SECURE: ${{ vars.SMTP_SECURE || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OTEL_TRACING_ENABLED: ${{ vars.OTEL_TRACING_ENABLED || 'false' }}
          OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME || 'expense-manager' }}
          OTEL_DEPLOYMENT_ENVIRONMENT: ${{ vars.OTEL_DEPLOYMENT_ENVIRONMENT || 'production' }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT || '' }}
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT || '' }}
          OTEL_TRACES_SAMPLE_RATE: ${{ vars.OTEL_TRACES_SAMPLE_RATE || '0.1' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/expense-manager' }}
          SSH_KEY_FILE: ${{ runner.temp }}/vps_ssh_key
          KNOWN_HOSTS_FILE: ${{ runner.temp }}/known_hosts
          ENV_FILE_PATH: ${{ runner.temp }}/expense-manager.env
        run: |
          set -euo pipefail

          write_env_var() {
            key="$1"
            value="$2"
            escaped_value="$(printf '%s' "${value}" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g')"
            printf '%s="%s"\n' "${key}" "${escaped_value}" >> "${ENV_FILE_PATH}"
          }

          if [ -n "${VPS_ENV_FILE}" ]; then
            umask 077
            printf '%s\n' "${VPS_ENV_FILE}" | sed 's/\r$//' > "${ENV_FILE_PATH}"
          else
            required_individual_secrets=(
              DOMAIN_NAME
              ORIGIN
              BETTER_AUTH_SECRET
              POSTGRES_PASSWORD
            )

            case "${EMAIL_PROVIDER}" in
              mailjet)
                required_individual_secrets+=(
                  MAILJET_API_KEY
                  MAILJET_SECRET_KEY
                  MAILJET_FROM
                )
                ;;
              sender)
                required_individual_secrets+=(
                  SENDER_API_TOKEN
                  SENDER_FROM
                )
                ;;
              smtp)
                required_individual_secrets+=(
                  SMTP_HOST
                  SMTP_FROM
                )
                ;;
              auto)
                if [ -n "${MAILJET_API_KEY}" ] && [ -n "${MAILJET_SECRET_KEY}" ] && [ -n "${MAILJET_FROM}" ]; then
                  :
                elif [ -n "${SENDER_API_TOKEN}" ] && [ -n "${SENDER_FROM}" ]; then
                  :
                elif [ -n "${SMTP_HOST}" ] && [ -n "${SMTP_FROM}" ]; then
                  :
                else
                  echo "::error::EMAIL_PROVIDER=auto requires Mailjet, Sender or SMTP secrets."
                  exit 1
                fi
                ;;
              log)
                echo "::warning::EMAIL_PROVIDER=log writes transactional email to logs and should not be used in production."
                ;;
              *)
                echo "::error::EMAIL_PROVIDER must be auto, mailjet, sender, smtp or log."
                exit 1
                ;;
            esac

            case "${BACKUP_ENABLED}" in
              true)
                required_individual_secrets+=(
                  RESTIC_REPOSITORY
                  RESTIC_PASSWORD
                )
                ;;
              false)
                echo "::warning::BACKUP_ENABLED=false. Deploy will run without remote restic backups."
                ;;
              *)
                echo "::error::BACKUP_ENABLED must be true or false."
                exit 1
                ;;
            esac

            for name in "${required_individual_secrets[@]}"; do
              if [ -z "${!name}" ]; then
                echo "::error::Set ${name} as a production environment secret, or set VPS_ENV_FILE."
                exit 1
              fi
            done

            umask 077
            : > "${ENV_FILE_PATH}"
            write_env_var PUBLIC_APP_NAME "${PUBLIC_APP_NAME}"
            write_env_var DOMAIN_NAME "${DOMAIN_NAME}"
            write_env_var ORIGIN "${ORIGIN}"
            write_env_var TRUSTED_ORIGINS "${TRUSTED_ORIGINS}"
            write_env_var BETTER_AUTH_SECRET "${BETTER_AUTH_SECRET}"
            write_env_var BETTER_AUTH_SECRET_PREVIOUS "${BETTER_AUTH_SECRET_PREVIOUS}"
            write_env_var REQUIRE_EMAIL_VERIFICATION "${REQUIRE_EMAIL_VERIFICATION}"
            write_env_var ALLOW_REGISTRATION "${ALLOW_REGISTRATION}"
            write_env_var AUTH_RATE_LIMIT_IDENTIFIER_MAX "${AUTH_RATE_LIMIT_IDENTIFIER_MAX}"
            write_env_var AUTH_RATE_LIMIT_IP_MAX "${AUTH_RATE_LIMIT_IP_MAX}"
            write_env_var AUTH_RATE_LIMIT_WINDOW_SECONDS "${AUTH_RATE_LIMIT_WINDOW_SECONDS}"
            write_env_var POSTGRES_DB "${POSTGRES_DB}"
            write_env_var POSTGRES_USER "${POSTGRES_USER}"
            write_env_var POSTGRES_PASSWORD "${POSTGRES_PASSWORD}"
            write_env_var DB_POOL_MAX "${DB_POOL_MAX}"
            write_env_var TRUST_PROXY_HEADERS "${TRUST_PROXY_HEADERS}"
            write_env_var TRUSTED_PROXY_CIDR "${TRUSTED_PROXY_CIDR}"
            write_env_var BACKUP_ENABLED "${BACKUP_ENABLED}"
            write_env_var RESTIC_REPOSITORY "${RESTIC_REPOSITORY}"
            write_env_var RESTIC_PASSWORD "${RESTIC_PASSWORD}"
            write_env_var RESTIC_HOST "${RESTIC_HOST}"
            write_env_var RESTIC_INIT_REPOSITORY "${RESTIC_INIT_REPOSITORY}"
            write_env_var RESTIC_KEEP_DAILY "${RESTIC_KEEP_DAILY}"
            write_env_var RESTIC_KEEP_WEEKLY "${RESTIC_KEEP_WEEKLY}"
            write_env_var RESTIC_KEEP_MONTHLY "${RESTIC_KEEP_MONTHLY}"
            write_env_var RESTIC_CHECK_AFTER_BACKUP "${RESTIC_CHECK_AFTER_BACKUP}"
            write_env_var AWS_ACCESS_KEY_ID "${AWS_ACCESS_KEY_ID}"
            write_env_var AWS_SECRET_ACCESS_KEY "${AWS_SECRET_ACCESS_KEY}"
            write_env_var AWS_DEFAULT_REGION "${AWS_DEFAULT_REGION}"
            write_env_var REGISTRY "${REGISTRY}"
            write_env_var IMAGE_OWNER_LOWERCASE "${IMAGE_OWNER_LOWERCASE}"
            write_env_var IMAGE_CLEANUP_ENABLED "${IMAGE_CLEANUP_ENABLED}"
            write_env_var TRAEFIK_NETWORK "${TRAEFIK_NETWORK}"
            write_env_var TRAEFIK_HTTP_ENTRYPOINT "${TRAEFIK_HTTP_ENTRYPOINT}"
            write_env_var TRAEFIK_ENTRYPOINT "${TRAEFIK_ENTRYPOINT}"
            write_env_var TRAEFIK_CERT_RESOLVER "${TRAEFIK_CERT_RESOLVER}"
            write_env_var APP_MEM_LIMIT "${APP_MEM_LIMIT}"
            write_env_var APP_CPUS "${APP_CPUS}"
            write_env_var POSTGRES_MEM_LIMIT "${POSTGRES_MEM_LIMIT}"
            write_env_var POSTGRES_CPUS "${POSTGRES_CPUS}"
            write_env_var BACKUP_MEM_LIMIT "${BACKUP_MEM_LIMIT}"
            write_env_var BACKUP_CPUS "${BACKUP_CPUS}"
            write_env_var EMAIL_PROVIDER "${EMAIL_PROVIDER}"
            write_env_var EMAIL_DELIVERY_TIMEOUT_MS "${EMAIL_DELIVERY_TIMEOUT_MS}"
            write_env_var EMAIL_DELIVERY_CONCURRENCY "${EMAIL_DELIVERY_CONCURRENCY}"
            write_env_var MAILJET_API_KEY "${MAILJET_API_KEY}"
            write_env_var MAILJET_SECRET_KEY "${MAILJET_SECRET_KEY}"
            write_env_var MAILJET_FROM "${MAILJET_FROM}"
            write_env_var MAILJET_WEBHOOK_USERNAME "${MAILJET_WEBHOOK_USERNAME}"
            write_env_var MAILJET_WEBHOOK_PASSWORD "${MAILJET_WEBHOOK_PASSWORD}"
            write_env_var SENDER_API_TOKEN "${SENDER_API_TOKEN}"
            write_env_var SENDER_FROM "${SENDER_FROM}"
            write_env_var SMTP_HOST "${SMTP_HOST}"
            write_env_var SMTP_PORT "${SMTP_PORT}"
            write_env_var SMTP_SECURE "${SMTP_SECURE}"
            write_env_var SMTP_USER "${SMTP_USER}"
            write_env_var SMTP_PASSWORD "${SMTP_PASSWORD}"
            write_env_var SMTP_FROM "${SMTP_FROM}"
            write_env_var OTEL_TRACING_ENABLED "${OTEL_TRACING_ENABLED}"
            write_env_var OTEL_SERVICE_NAME "${OTEL_SERVICE_NAME}"
            write_env_var OTEL_DEPLOYMENT_ENVIRONMENT "${OTEL_DEPLOYMENT_ENVIRONMENT}"
            write_env_var OTEL_EXPORTER_OTLP_ENDPOINT "${OTEL_EXPORTER_OTLP_ENDPOINT}"
            write_env_var OTEL_EXPORTER_OTLP_TRACES_ENDPOINT "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}"
            write_env_var OTEL_TRACES_SAMPLE_RATE "${OTEL_TRACES_SAMPLE_RATE}"
          fi

          if [ ! -s "${ENV_FILE_PATH}" ]; then
            echo "::error::Production environment secrets produced an empty environment file."
            exit 1
          fi

          required_keys=(
            PUBLIC_APP_NAME
            DOMAIN_NAME
            ORIGIN
            BETTER_AUTH_SECRET
            REQUIRE_EMAIL_VERIFICATION
            ALLOW_REGISTRATION
            POSTGRES_DB
            POSTGRES_USER
            POSTGRES_PASSWORD
            DB_POOL_MAX
            TRUST_PROXY_HEADERS
            BACKUP_ENABLED
            REGISTRY
            IMAGE_OWNER_LOWERCASE
            TRAEFIK_NETWORK
            TRAEFIK_HTTP_ENTRYPOINT
            TRAEFIK_ENTRYPOINT
            TRAEFIK_CERT_RESOLVER
            EMAIL_PROVIDER
          )

          proxy_headers_value="$( (grep -E "^TRUST_PROXY_HEADERS=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
          case "${proxy_headers_value}" in
            true)
              required_keys+=(TRUSTED_PROXY_CIDR)
              ;;
            false)
              ;;
            *)
              echo "::error::TRUST_PROXY_HEADERS must be true or false."
              exit 1
              ;;
          esac

          email_provider_value="$( (grep -E "^EMAIL_PROVIDER=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
          case "${email_provider_value}" in
            mailjet)
              required_keys+=(
                MAILJET_API_KEY
                MAILJET_SECRET_KEY
                MAILJET_FROM
              )
              ;;
            sender)
              required_keys+=(
                SENDER_API_TOKEN
                SENDER_FROM
              )
              ;;
            smtp)
              required_keys+=(
                SMTP_HOST
                SMTP_FROM
              )
              ;;
            auto)
              mailjet_api_key_value="$( (grep -E "^MAILJET_API_KEY=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
              mailjet_secret_key_value="$( (grep -E "^MAILJET_SECRET_KEY=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
              mailjet_from_value="$( (grep -E "^MAILJET_FROM=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
              sender_api_token_value="$( (grep -E "^SENDER_API_TOKEN=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
              sender_from_value="$( (grep -E "^SENDER_FROM=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
              smtp_host_value="$( (grep -E "^SMTP_HOST=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
              smtp_from_value="$( (grep -E "^SMTP_FROM=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
              if [ -n "${mailjet_api_key_value}" ] && [ -n "${mailjet_secret_key_value}" ] && [ -n "${mailjet_from_value}" ]; then
                :
              elif [ -n "${sender_api_token_value}" ] && [ -n "${sender_from_value}" ]; then
                :
              elif [ -n "${smtp_host_value}" ] && [ -n "${smtp_from_value}" ]; then
                :
              else
                echo "::error::EMAIL_PROVIDER=auto requires Mailjet, Sender or SMTP values in the production environment file."
                exit 1
              fi
              ;;
            log)
              echo "::warning::EMAIL_PROVIDER=log writes transactional email to logs and should not be used in production."
              ;;
            *)
              echo "::error::EMAIL_PROVIDER must be auto, mailjet, sender, smtp or log."
              exit 1
              ;;
          esac

          backup_enabled_value="$( (grep -E "^BACKUP_ENABLED=" "${ENV_FILE_PATH}" || true) | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//' )"
          case "${backup_enabled_value}" in
            true)
              required_keys+=(
                RESTIC_REPOSITORY
                RESTIC_PASSWORD
              )
              ;;
            false)
              echo "::warning::BACKUP_ENABLED=false in production environment file. Remote backups are disabled."
              ;;
            *)
              echo "::error::BACKUP_ENABLED must be true or false."
              exit 1
              ;;
          esac

          for name in "${required_keys[@]}"; do
            if ! grep -Eq "^${name}=" "${ENV_FILE_PATH}"; then
              echo "::error::VPS_ENV_FILE is missing required key ${name}."
              exit 1
            fi
            value="$(grep -E "^${name}=" "${ENV_FILE_PATH}" | tail -n 1 | cut -d= -f2- | sed -E 's/^"//; s/"$//')"
            if [ -z "${value}" ]; then
              echo "::error::VPS_ENV_FILE key ${name} must not be empty."
              exit 1
            fi
          done

          if grep -Eq '(replace-with|<sender-|<mailjet-|<openssl|<long-random|<github-owner|<remote-backup|your-domain\.example|your-verified-domain\.example|finance\.example\.com|s3\.example\.com)' "${ENV_FILE_PATH}"; then
            echo "::error::VPS_ENV_FILE still contains placeholder values."
            exit 1
          fi

          REMOTE_TMP=".expense-manager.env.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          scp -i "${SSH_KEY_FILE}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${KNOWN_HOSTS_FILE}" \
            -P "${VPS_PORT}" \
            "${ENV_FILE_PATH}" \
            "${VPS_USERNAME}@${VPS_HOST}:${REMOTE_TMP}"

          DEPLOY_PATH_Q="$(printf '%q' "${DEPLOY_PATH}")"
          REMOTE_TMP_Q="$(printf '%q' "${REMOTE_TMP}")"
          ssh -i "${SSH_KEY_FILE}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${KNOWN_HOSTS_FILE}" \
            -p "${VPS_PORT}" \
            "${VPS_USERNAME}@${VPS_HOST}" \
            "set -euo pipefail
            DEPLOY_PATH=${DEPLOY_PATH_Q}
            REMOTE_TMP=${REMOTE_TMP_Q}
            install -d -m 750 \"\${DEPLOY_PATH}\"
            tmp_file=\$(mktemp \"\${DEPLOY_PATH}/.env.XXXXXX\")
            install -m 600 \"\${HOME}/\${REMOTE_TMP}\" \"\${tmp_file}\"
            rm -f \"\${HOME}/\${REMOTE_TMP}\"

            if [ -f \"\${DEPLOY_PATH}/.env\" ]; then
              for key in IMAGE_TAG PREVIOUS_IMAGE_TAG LAST_SUCCESSFUL_IMAGE_TAG LAST_SUCCESSFUL_DEPLOY_SHA LAST_PREDEPLOY_BACKUP LAST_ROLLBACK_IMAGE_TAG LAST_ROLLBACK_AT LAST_ROLLBACK_REASON; do
                existing_line=\$(grep -E \"^\${key}=\" \"\${DEPLOY_PATH}/.env\" | tail -n 1 || true)
                if [ -n \"\${existing_line}\" ]; then
                  next_file=\$(mktemp \"\${DEPLOY_PATH}/.env.next.XXXXXX\")
                  grep -v -E \"^\${key}=\" \"\${tmp_file}\" > \"\${next_file}\" || true
                  printf '%s\n' \"\${existing_line}\" >> \"\${next_file}\"
                  cat \"\${next_file}\" > \"\${tmp_file}\"
                  rm -f \"\${next_file}\"
                fi
              done
            fi

            chmod 600 \"\${tmp_file}\"
            mv \"\${tmp_file}\" \"\${DEPLOY_PATH}/.env\""

          rm -f "${ENV_FILE_PATH}"

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/expense-manager' }}
          COMPOSE_CMD: ${{ vars.COMPOSE_COMMAND || 'docker compose' }}
          REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          IMAGE_OWNER: ${{ vars.IMAGE_OWNER_LOWERCASE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: ${{ runner.temp }}/vps_ssh_key
          port: ${{ secrets.VPS_PORT || 22 }}
          fingerprint: ${{ secrets.VPS_SSH_HOST_FINGERPRINT }}
          envs: DEPLOY_PATH,COMPOSE_CMD,REGISTRY,HEAD_SHA,IMAGE_OWNER,GITHUB_REPOSITORY,GITHUB_TOKEN
          script: |
            set -euo pipefail
            HEAD_SHA_SHORT="$(printf '%s' "${HEAD_SHA}" | cut -c1-7)"
            DEPLOY_SCRIPT_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${HEAD_SHA}/scripts/deploy-vps.sh"
            curl_headers=(-H "Accept: application/vnd.github.raw")
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              curl_headers+=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
            fi
            curl -fsSL "${curl_headers[@]}" -o /tmp/expense-manager-deploy.sh "${DEPLOY_SCRIPT_URL}"
            chmod 700 /tmp/expense-manager-deploy.sh
            IMAGE_TAG="sha-${HEAD_SHA_SHORT}" /tmp/expense-manager-deploy.sh
