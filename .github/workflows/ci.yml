name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: expense_manager
          POSTGRES_USER: expense_manager
          POSTGRES_PASSWORD: expense_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense_manager -d expense_manager"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PUBLIC_APP_NAME: Expense Manager
      APP_DOMAIN: localhost
      ORIGIN: http://localhost:4173
      BETTER_AUTH_SECRET: ci-secret-ci-secret-ci-secret-32
      POSTGRES_DB: expense_manager
      POSTGRES_USER: expense_manager
      POSTGRES_PASSWORD: expense_manager
      DATABASE_URL: postgres://expense_manager:expense_manager@localhost:5432/expense_manager
      DB_POOL_MAX: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - name: Configure pnpm cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod
      - run: sh -n scripts/backup.sh
      - run: docker compose config
      - run: docker compose --profile tools config
      - run: pnpm db:migrate
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm test:coverage
      - run: pnpm build
      - run: docker build --target runner -t expense-manager:ci .
      - run: docker build --target migrator -t expense-manager-migrate:ci .
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
