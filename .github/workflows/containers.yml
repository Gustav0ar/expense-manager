name: Containers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

concurrency:
  # A completed build triggers production deployment. Cancel superseded builds so
  # an older commit cannot finish after a newer one and deploy its stale images.
  group: expense-manager-containers-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CONTAINER_PLATFORMS: ${{ vars.CONTAINER_PLATFORMS || 'linux/amd64,linux/arm64' }}

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - id: image-prefix
        name: Prepare image prefix
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "value=${owner}/expense-manager" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta-app
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-app
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build-app
        name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          platforms: ${{ env.CONTAINER_PLATFORMS }}
          provenance: mode=max
          sbom: true
          labels: ${{ steps.meta-app.outputs.labels }}
          tags: ${{ steps.meta-app.outputs.tags }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Attest app image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-app
          subject-digest: ${{ steps.build-app.outputs.digest }}
          push-to-registry: true

      - id: meta-migrate
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-migrate
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build-migrate
        name: Build and push migration image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: migrator
          push: true
          platforms: ${{ env.CONTAINER_PLATFORMS }}
          provenance: mode=max
          sbom: true
          labels: ${{ steps.meta-migrate.outputs.labels }}
          tags: ${{ steps.meta-migrate.outputs.tags }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

      - name: Attest migration image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-migrate
          subject-digest: ${{ steps.build-migrate.outputs.digest }}
          push-to-registry: true

      - id: meta-backup
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-backup
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build-backup
        name: Build and push backup image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: backup
          push: true
          platforms: ${{ env.CONTAINER_PLATFORMS }}
          provenance: mode=max
          sbom: true
          labels: ${{ steps.meta-backup.outputs.labels }}
          tags: ${{ steps.meta-backup.outputs.tags }}
          cache-from: type=gha,scope=backup
          cache-to: type=gha,mode=max,scope=backup

      - name: Attest backup image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.image-prefix.outputs.value }}-backup
          subject-digest: ${{ steps.build-backup.outputs.digest }}
          push-to-registry: true
