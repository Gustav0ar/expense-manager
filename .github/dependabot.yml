version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    ignore:
      # Svelte tooling in this project does not yet support TypeScript 7.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    groups:
      production-dependencies:
        dependency-type: production
      development-tooling:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      docker-base-images:
        patterns:
          - '*'
