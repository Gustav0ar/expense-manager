global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by:
    - service
    - severity
  group_wait: 30s
  group_interval: 10m
  repeat_interval: 6h
  routes:
    - receiver: telegram
      matchers:
        - severity="critical"
      repeat_interval: 1h
    - receiver: telegram
      matchers:
        - severity="warning"
      repeat_interval: 6h
    - receiver: telegram
      matchers:
        - severity="info"
      repeat_interval: 12h

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity=~"warning|info"
    equal:
      - service

  - source_matchers:
      - service="traefik"
      - severity="critical"
    target_matchers:
      - service="expense-manager"
      - severity=~"warning|info"

receivers:
  - name: telegram
    webhook_configs:
      - url: http://telegram-alerts:8080/alert
        send_resolved: true
